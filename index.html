function cat(h=""){
  const t=h.toLowerCase();
  if(t.includes("break")||t.includes("flash")||t.includes("urgent"))return"BREAKING";
  if(t.includes("bitcoin")||t.includes("crypto")||t.includes("eth")||t.includes("btc")||t.includes("solana"))return"CRYPTO";
  if(t.includes("fed")||t.includes("powell")||t.includes("fomc")||t.includes("gdp")||t.includes("inflation")||t.includes("cpi")||t.includes("ecb"))return"MACRO";
  if(t.includes("eur")||t.includes("jpy")||t.includes("sgd")||t.includes("yuan")||t.includes("dollar")||t.includes("currency"))return"FOREX";
  if(t.includes("gold")||t.includes("oil")||t.includes("crude")||t.includes("brent")||t.includes("copper")||t.includes("lng"))return"COMMODITIES";
  return"EQUITIES";
}

function sent(h=""){
  const t=h.toLowerCase();
  const b=["surge","rally","gain","jump","rise","beat","strong","bullish","boost","soar","advance","recover","rebound","climb"].filter(w=>t.includes(w)).length;
  const r=["fall","drop","decline","plunge","miss","weak","cut","warn","bearish","crash","slump","tumble","retreat","slide","slip"].filter(w=>t.includes(w)).length;
  return b>r?"BULLISH":r>b?"BEARISH":"NEUTRAL";
}

function makeDemo(){
  return [...DEMOS].sort(()=>Math.random()-0.5).map((d,i)=>({
    id:"demo_"+i+"_"+d.h.slice(0,8),
    headline:d.h, category:cat(d.h), sentiment:sent(d.h),
    timestamp:new Date(Date.now()-i*48000), isNew:i<3, source:d.s,
  }));
}

async function fetchNews(apiKey){
  if(!apiKey||!apiKey.trim())return makeDemo();
  try{
    const res=await fetch(`https://finnhub.io/api/v1/news?category=general&token=${apiKey.trim()}`);
    if(!res.ok)return makeDemo();
    const data=await res.json();
    if(!Array.isArray(data)||data.length===0)return makeDemo();
    const items=data.slice(0,25).map(n=>({
      id:String(n.id||Math.random()),
      headline:n.headline||n.summary||"",
      category:cat(n.headline||""), sentiment:sent(n.headline||""),
      timestamp:n.datetime?new Date(n.datetime*1000):new Date(),
      isNew:true, source:(n.source||"WIRE").toUpperCase().slice(0,22),
    })).filter(n=>n.headline.length>20);
    return items.length>0?items:makeDemo();
  }catch(e){return makeDemo();}
}

function App(){
  const [news,setNews]=useState([]);
  const [loading,setLoading]=useState(false);
  const [lastUpdate,setLastUpdate]=useState(null);
  const [filter,setFilter]=useState("ALL");
  const [countdown,setCountdown]=useState(60);
  const [breaking,setBreaking]=useState(null);
  const [clock,setClock]=useState(new Date());
  const [apiKey,setApiKey]=useState(null);

  const refresh=useCallback(async()=>{
    setLoading(true);
    const fresh=await fetchNews(apiKey);
    setNews(prev=>{
      const existing=new Set(prev.map(n=>n.id));
      const tagged=fresh.map(n=>({...n,isNew:!existing.has(n.id)}));
      const merged=[...tagged,...prev.map(n=>({...n,isNew:false}))];
      const seen=new Set();
      const deduped=merged.filter(n=>{if(seen.has(n.id))return false;seen.add(n.id);return true;});
      const brk=tagged.find(n=>n.isNew&&n.category==="BREAKING");
      if(brk)setBreaking(brk);
      return deduped.slice(0,80);
    });
    setLastUpdate(new Date());
    setCountdown(60);
    setLoading(false);
  },[apiKey]);

  useEffect(()=>{
    if(apiKey===null)return;
    refresh();
    const iv=setInterval(refresh,60000);
    return()=>clearInterval(iv);
  },[refresh,apiKey]);

  useEffect(()=>{const t=setInterval(()=>setCountdown(c=>c<=1?60:c-1),1000);return()=>clearInterval(t);},[]);

  const filtered=filter==="ALL"?news:news.filter(n=>n.category===filter);

            return(

          <KeyEntry onConnect={k=>setApiKey(k)}/>
        ):loading&&news.length===0?(
          <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",flex:1,gap:"20px"}}>
            <div style={{width:"34px",height:"34px",border:`2px solid ${T.border}`,borderTop:`2px solid ${T.amber}`,borderRadius:"50%",animation:"spin 0.9s linear infinite"}}/>
            <div style={{fontFamily:"'Syne',sans-serif",fontSize:"10px",color:T.textMuted,letterSpacing:"0.18em",animation:"shimmer 1.5s infinite"}}>CONNECTING TO WIRE SERVICES...</div>
            <div style={{fontFamily:"'Lora',serif",fontSize:"12px",color:T.textMuted,fontStyle:"italic",opacity:0.4}}>Marina Bay · Singapore</div>
          </div>
        ):filtered.length===0?(
          <div style={{padding:"40px",textAlign:"center",fontFamily:"'Syne',sans-serif",fontSize:"10px",color:T.textMuted,letterSpacing:"0.12em"}}>NO ITEMS IN THIS CATEGORY</div>
        ):(
          filtered.map((item,i)=>(
            <div key={item.id} style={{animation:`fadeUp 0.32s ease ${Math.min(i*0.04,0.5)}s both`}}>
              <Card item={item}/>
            </div>
          ))
        )}
      </div>

      {/* Footer */}
      <div style={{position:"relative",zIndex:10,padding:"6px 20px",background:T.bgPanel,borderTop:`1px solid ${T.border}`,display:"flex",justifyContent:"space-between",fontSize:"9px",color:T.textMuted,letterSpacing:"0.08em"}}>
        <span>FOR INFORMATIONAL PURPOSES ONLY · NOT INVESTMENT ADVICE</span>
        <span style={{color:T.amber,opacity:0.5}}>MATCHA FINANCIAL SYSTEMS · SINGAPORE © 2026</span>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
