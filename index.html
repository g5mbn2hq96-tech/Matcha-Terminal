<!DOCTYPE html>

<html>
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Test</title>
</head>
<body style="background:#080C14;color:#E8EAEF;font-family:sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:20px;">
  <div id="msg" style="font-size:20px;">JavaScript not running</div>
  <button id="btn" style="padding:12px 24px;background:#FFAD3B;border:none;border-radius:4px;font-size:16px;cursor:pointer;">Click me</button>
  <script>
    document.getElementById("msg").textContent = "JavaScript IS running!";
    document.getElementById("btn").addEventListener("click", function() {
      document.getElementById("msg").textContent = "Button works!";
      document.getElementById("msg").style.color = "#4EEFC4";
    });
  </script>
</body>
</html>
